services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/obolus.db
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-access-secret-minimum-32-characters}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh-secret-minimum-32-characters}
      - CORS_ORIGIN=http://localhost:8080
      - NODE_ENV=production
      - UPLOAD_DIR=/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  uploads:
